version: "3.9"

services:
  #------DBs--------

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - ./redis_data:/data
    networks:
      - nexus_net
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  
  #------------APP instances----------
  app1:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 5001
    depends_on:
      redis: {condition: service_healthy}
    networks:
      - nexus_net
  
  app2:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 5002
    depends_on:
      redis: {condition: service_healthy}
    networks:
      - nexus_net
  
  app3:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 5003
    depends_on:
      redis: {condition: service_healthy}
    networks:
      - nexus_net
  
  app4:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 5004
    depends_on:
      redis: {condition: service_healthy}
    networks:
      - nexus_net
  
  app5:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 5005
    depends_on:
      redis: {condition: service_healthy}
    networks:
      - nexus_net
  


  #--------NGINX----------

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nexuschat.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
      - app3
      - app4
      - app5
    networks:
      - nexus_net

volumes:
  redis_data:

networks:
  nexus_net:
    driver: bridge