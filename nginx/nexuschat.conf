# Load balnacing

upstream nexuschat_backend{
        ip_hash;
        server app1:5001 max_fails=3 fail_timeout=30s;
        server app2:5002 max_fails=3 fail_timeout=30s;
        server app3:5003 max_fails=3 fail_timeout=30s;
        server app4:5004 max_fails=3 fail_timeout=30s;
        server app5:5005 max_fails=3 fail_timeout=30s;

        keepalive 32;
}

server{
        listen 80;

        location /{
                proxy_pass http://nexuschat_backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                proxy_read_timeout 86400;
                proxy_send_timeout 86400;
        }
}

